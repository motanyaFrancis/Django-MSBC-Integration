{% extends 'base.html' %}
{% load static %}
{% block title %}Login{% endblock %}

{% block body %}
<div class="container-fluid page-body-wrapper full-page-wrapper">
    <div class="content-wrapper d-flex align-items-center auth px-0">
        <div class="row w-100 mx-0">
            <div class="col-lg-4 mx-auto">
                <div class="auth-form-light text-left py-5 px-4 px-sm-5">
                    <div class="brand-logo">
                        <img src="{% static 'assets/images/logo.svg' %}" alt="logo">
                    </div>
                    <h4>Hello! let's get started</h4>
                    <h6 class="fw-light">Sign in to continue.</h6>
                    <form class="pt-3" action="{% url 'auth' %}" method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <input type="text" class="form-control form-control-lg" name="username"
                                id="exampleInputEmail1" placeholder="Username">
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-control form-control-lg" name="password"
                                id="exampleInputPassword1" placeholder="Password">
                        </div>
                        <div class="mt-3 d-grid gap-2">
                            <button class="btn btn-block btn-primary btn-lg fw-medium auth-form-btn" type="submit">SIGN
                                IN</button>
                        </div>
                        <div class="my-2 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <label class="form-check-label text-muted">
                                    <input type="checkbox" class="form-check-input"> Keep me signed in </label>
                            </div>
                            <a href="#" class="auth-link text-black" data-bs-toggle="modal"
                                data-bs-target="#forgotPasswordModal">Forgot password?</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-0">
            <div class="modal-header border-0 rounded-0 bg-primary text-white py-3">
                <h5 class="modal-title fw-light" id="forgotPasswordModalLabel">Reset Password</h5>
                <button type="button" class="btn-close text-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="forgotPasswordForm" action='/forgot-password/' method="post">
                    {% csrf_token %}
                    <div class="form-group mb-3">
                        <label for="forgotUsername" class="form-label text-muted">Username</label>
                        <input type="text" class="form-control form-control-lg" name="username" id="forgotUsername"
                            placeholder="Enter your username" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-md fw-medium rounded-0">Submit</button>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <p class="text-muted small">We'll send you a response to your email.</p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
