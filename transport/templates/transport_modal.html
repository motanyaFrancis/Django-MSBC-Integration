<!-- TRANSPORT REQUEST MODAL -->
<div class="modal fade" id="transportRequestModal" data-bs-backdrop="static" data-bs-keyboard="false"
    tabindex="-1" aria-hidden="true">

    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">

        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">

            <!-- HEADER -->
            <div class="modal-header bg-primary text-white border-0 px-4 px-lg-5 py-4">

                <div>
                    <h4 class="modal-title fw-bold mb-1 d-flex align-items-center">
                        <i class="las la-bus me-2 fs-3"></i>
                        New Transport Request
                    </h4>

                    <small class="opacity-75">
                        Complete the form below to submit your transport request
                    </small>
                </div>

                <button type="button" class="btn-close btn-close-white shadow-none"
                    data-bs-dismiss="modal" aria-label="Close">
                </button>

            </div>

            <!-- BODY -->
            <div class="modal-body bg-theme-image px-3 px-lg-5 py-4">

                <form id="TransportForm" action="{% url 'transport' %}" method="post" novalidate>

                    {% csrf_token %}

                    <input type="hidden" name="reqNo">
                    <input type="hidden" name="myAction" value="insert">

                    <!-- TRAVEL INFORMATION -->
                    <div class="card border-0 shadow-sm rounded-4 mb-4">

                        <div class="card-header bg-white border-0 pt-4 px-4">

                            <div class="d-flex align-items-center">

                                <div class="icon-wrapper bg-primary-subtle text-primary me-3">
                                    <i class="las la-route"></i>
                                </div>

                                <div>
                                    <h5 class="fw-bold mb-1">
                                        Travel Information
                                    </h5>

                                    <small class="text-muted">
                                        Provide your travel details
                                    </small>
                                </div>

                            </div>

                        </div>

                        <div class="card-body px-4 pb-4">

                            <div class="row g-4">

                                <div class="col-lg-4 col-md-6">

                                    <label class="form-label fw-semibold">
                                        Transport Mode
                                        <span class="text-danger">*</span>
                                    </label>

                                    <select class="form-select" name="transportMode" required>

                                        <option selected disabled value="0">
                                            Select Option
                                        </option>

                                        <option value="1">
                                            Road
                                        </option>

                                    </select>

                                </div>

                                <div class="col-lg-4 col-md-6">

                                    <label class="form-label fw-semibold">
                                        Travel Type
                                        <span class="text-danger">*</span>
                                    </label>

                                    <select class="form-select" name="travelType" id="travelType" required>

                                        <option selected disabled value="0">
                                            Select Option
                                        </option>

                                        <option value="0">
                                            Local
                                        </option>

                                        <option value="1">
                                            Foreign
                                        </option>

                                    </select>

                                </div>

                                <div class="col-lg-4 col-md-12">

                                    <label class="form-label fw-semibold">
                                        Destination
                                    </label>

                                    <select class="form-select" name="destination">

                                        <option class="after" disabled selected>
                                            Select Destination
                                        </option>

                                    </select>

                                </div>

                                <div class="col-lg-6 col-md-6">

                                    <label class="form-label fw-semibold">
                                        Start Date
                                    </label>

                                    <input type="date" class="form-control" name="startDate">

                                </div>

                                <div class="col-lg-6 col-md-6">

                                    <label class="form-label fw-semibold">
                                        Start Time
                                    </label>

                                    <input type="time" class="form-control" name="startTime">

                                </div>

                                <div class="col-lg-6 col-md-6">

                                    <label class="form-label fw-semibold">
                                        End Date
                                    </label>

                                    <input type="date" class="form-control" name="endDate">

                                </div>

                                <div class="col-lg-6 col-md-6">

                                    <label class="form-label fw-semibold">
                                        End Time
                                    </label>

                                    <input type="time" class="form-control" name="endTime">

                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- VEHICLE INFORMATION -->
                    <div class="card border-0 shadow-sm rounded-4 mb-4">

                        <div class="card-header bg-white border-0 pt-4 px-4">

                            <div class="d-flex align-items-center">

                                <div class="icon-wrapper bg-success-subtle text-success me-3">
                                    <i class="las la-car"></i>
                                </div>

                                <div>
                                    <h5 class="fw-bold mb-1">
                                        Vehicle Information
                                    </h5>

                                    <small class="text-muted">
                                        Vehicle and allowance details
                                    </small>
                                </div>

                            </div>

                        </div>

                        <div class="card-body px-4 pb-4">

                            <div class="row g-4">

                                <div class="col-lg-4 col-md-6">

                                    <label class="form-label fw-semibold">
                                        Use Employee Vehicle
                                    </label>

                                    <select class="form-select" name="useEmployeeVehicle">

                                        <option selected disabled value="0">
                                            Select Option
                                        </option>

                                        <option value="True">
                                            Yes
                                        </option>

                                        <option value="False">
                                            No
                                        </option>

                                    </select>

                                </div>

                                <div class="col-lg-4 col-md-6">

                                    <label class="form-label fw-semibold">
                                        Car Capacity
                                    </label>

                                    <input type="text" class="form-control" name="carCapacity"
                                        placeholder="Enter car capacity">

                                </div>

                                <div class="col-lg-4 col-md-12">

                                    <label class="form-label fw-semibold">
                                        Calculate Allowance
                                    </label>

                                    <select class="form-select" name="calculateAllowance">

                                        <option selected disabled value="0">
                                            Select Option
                                        </option>

                                        <option value="True">
                                            Yes
                                        </option>

                                        <option value="False">
                                            No
                                        </option>

                                    </select>

                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- REASON -->
                    <div class="card border-0 shadow-sm rounded-4">

                        <div class="card-header bg-white border-0 pt-4 px-4">

                            <div class="d-flex align-items-center">

                                <div class="icon-wrapper bg-warning-subtle text-warning me-3">
                                    <i class="las la-comment-dots"></i>
                                </div>

                                <div>
                                    <h5 class="fw-bold mb-1">
                                        Travel Reason
                                    </h5>

                                    <small class="text-muted">
                                        Briefly explain the purpose of travel
                                    </small>
                                </div>

                            </div>

                        </div>

                        <div class="card-body px-4 pb-4">

                            <label class="form-label fw-semibold">
                                Traveling Reason
                            </label>

                            <textarea class="form-control textarea-control"
                                name="travelingReason"
                                rows="5"
                                placeholder="Enter reason for travel">
                            </textarea>

                        </div>

                    </div>

                    <!-- FOOTER ACTIONS -->
                    <div class="d-flex flex-column flex-md-row justify-content-end gap-3 mt-5">

                        <button type="button"
                            class="btn btn-light border px-4 py-2"
                            data-bs-dismiss="modal">

                            Cancel

                        </button>

                        <button type="submit"
                            class="btn btn-primary px-5 py-2 shadow-sm">

                            Submit Request
                            <i class="las la-arrow-right ms-2"></i>

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<style>
    #transportRequestModal .modal-content {
        background: #f8f9fc;
    }

    #transportRequestModal .form-control,
    #transportRequestModal .form-select {
        min-height: 52px;
        border-radius: 14px;
        border: 1px solid #dfe3ea;
        font-size: 0.95rem;
        padding-left: 1rem;
        box-shadow: none;
        transition: all 0.2s ease-in-out;
    }

    #transportRequestModal textarea.form-control {
        min-height: 140px;
        resize: none;
        padding-top: 1rem;
    }

    #transportRequestModal .form-control:focus,
    #transportRequestModal .form-select:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.15rem rgba(13, 110, 253, 0.15);
    }

    #transportRequestModal .card {
        background: #fff;
    }

    #transportRequestModal .icon-wrapper {
        width: 50px;
        height: 50px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        flex-shrink: 0;
    }

    #transportRequestModal .btn {
        border-radius: 12px;
        min-height: 48px;
        font-weight: 600;
    }

    @media (max-width: 768px) {

        #transportRequestModal .modal-body {
            padding: 1rem !important;
        }

        #transportRequestModal .card-body {
            padding: 1.25rem !important;
        }

        #transportRequestModal .card-header {
            padding: 1.25rem !important;
        }
    }
</style>
