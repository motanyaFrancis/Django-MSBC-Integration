<body>
  <div class="container-scroller">
    {% include 'accounts/alert.html' %}
    {% block body %}

    {% endblock %}
  </div>

  <div id="idle-warning-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.6); z-index:9999;" class="modal-xl ">

    <div style="background:white; width:400px; margin:15% auto; padding:20px; border-radius:10px; text-align:center;"
      class="d-flex align-items-center justify-content-center gap-3 flex-column p-8"
    >

      <h3>Session Expiring Soon</h3>
      <p>You will be logged out in 1 minute due to inactivity.</p>

      <button onclick="window.location.reload()" class="btn btn-primary text-white">
        Stay Logged In
      </button>

    </div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap 5 Bundle -->

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- ProgressBar.js -->

  <!-- jQuery Cookie -->
  <script src="https://cdn.jsdelivr.net/npm/jquery.cookie@1.4.1/jquery.cookie.min.js"></script>

  <!-- Select2 -->
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <!-- DataTables -->
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <!-- DataTables Bootstrap 5 -->
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

  <!-- End plugin js for this page -->
  <!-- inject:js -->
  <script src="{% static 'assets/js/off-canvas.js' %}"></script>
  <script src="{% static 'assets/js/template.js' %}"></script>
  <script src="{% static 'assets/js/settings.js' %}"></script>
  <script src="{% static 'assets/js/hoverable-collapse.js' %}"></script>
  <script src="{% static 'assets/js/todolist.js' %}"></script>
  <!-- endinject -->
  <!-- Custom js for this page-->

  <script src="{% static 'assets/js/dashboard.js' %}"></script>
  <script src="{% static 'assets/js/Chart.roundedBarCharts.js' %}"></script>
  <!-- End custom js for this page-->
  <script>
    (function () {

      // ===== CONFIG =====
      const WARNING_TIME = 9 * 60 * 1000; // 9 minutes (warn at 1 min left if 10 min session)
      const LOGOUT_TIME = 10 * 60 * 1000; // 10 minutes

      let warningTimer;
      let logoutTimer;

      // ===== MULTI-TAB SYNC =====
      const channel = new BroadcastChannel("session_sync");

      function broadcast(event) {
        channel.postMessage(event);
        localStorage.setItem("session_event", JSON.stringify({
          event,
          time: Date.now()
        }));
      }

      channel.onmessage = (msg) => {
        handleEvent(msg.data);
      };

      window.addEventListener("storage", (e) => {
        if (e.key === "session_event" && e.newValue) {
          handleEvent(JSON.parse(e.newValue).event);
        }
      });

      function handleEvent(event) {
        if (event === "logout") {
          window.location.href = "/auth/";
        }

        if (event === "reset") {
          resetTimers(false);
        }
      }

      // ===== MODAL =====
      function showWarningModal() {
        let modal = document.getElementById("idle-warning-modal");
        if (modal) modal.style.display = "block";
      }

      function hideWarningModal() {
        let modal = document.getElementById("idle-warning-modal");
        if (modal) modal.style.display = "none";
      }

      // ===== TIMER LOGIC =====
      function startTimers() {

        clearTimeout(warningTimer);
        clearTimeout(logoutTimer);

        warningTimer = setTimeout(() => {
          showWarningModal();
        }, WARNING_TIME);

        logoutTimer = setTimeout(() => {
          broadcast("logout");
          window.location.href = "/auth/";
        }, LOGOUT_TIME);
      }

      function resetTimers(shouldBroadcast = true) {
        hideWarningModal();
        startTimers();

        if (shouldBroadcast) {
          broadcast("reset");
        }
      }

      // ===== ACTIVITY LISTENERS =====
      ["click", "mousemove", "keypress", "scroll", "touchstart"].forEach(evt => {
        document.addEventListener(evt, () => resetTimers(true));
      });

      // ===== INITIAL START =====
      startTimers();

    })();
  </script>
</body>

</html>
